# A workflow to build and test GTKWave on all major supported platforms.

name: CI

# TODO: Add a build job for macOS x86-64.
# TODO: Add a build job for linux arm64.
# TODO: Add oss-cad-suite style environment script to setup LD_LIBRARY_PATH
#       for the other binaries in the linux package.
# TODO: Consider to checkin the linux launcher.
# TODO: Create a pre-release with the build artifacts of all the platforms.
# TODO: Consider scanning the exported artifacts with clamav

on:
  # Run on push.
  push:
    branches: ["master"]

  # Run on a pull request.
  pull_request:
    branches: ["master"]

  # Allow to run manually
  workflow_dispatch:

jobs:
  build-windows-x86-64:
    name: Build (windows-x86-64)
    runs-on: windows-latest

    env:
      # This is set later.
      BUNDLE_WIN_PATH: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          install: >-
            mingw-w64-ucrt-x86_64-toolchain
            mingw-w64-ucrt-x86_64-gtk3
            mingw-w64-ucrt-x86_64-gtk4
            mingw-w64-ucrt-x86_64-pkgconf
            mingw-w64-ucrt-x86_64-glib2
            mingw-w64-ucrt-x86_64-gobject-introspection
            mingw-w64-ucrt-x86_64-gperf
            mingw-w64-ucrt-x86_64-meson
            mingw-w64-ucrt-x86_64-ninja
            mingw-w64-ucrt-x86_64-desktop-file-utils
            mingw-w64-ucrt-x86_64-diffutils
            zip
            git
            flex
            bison
            tree

      - name: Setup meson build
        shell: msys2 {0}
        run: |
          meson setup -Djudy=disabled -Dprefix=/tmp/gtkwave build

      - name: Compile GTKWave
        shell: msys2 {0}
        run: |
          meson compile -C build

      - name: Show the build directory tree
        shell: msys2 {0}
        run: |
          tree -d build

      - name: Create executable bundle
        shell: msys2 {0}
        run: |
          meson install -C build

      - name: Show the bundle directory tree
        shell: msys2 {0}
        run: |
          tree /tmp/gtkwave

      - name: Add UCRT64 DLLs
        shell: msys2 {0}
        run: |
          set -x

          # Typically "/ucrt64"
          echo "MINGW_PREFIX: [$MINGW_PREFIX]"

          BIN_DIR="/tmp/gtkwave/bin"
          LIB_DIR="/tmp/gtkwave/lib"

          # Collect raw dependency information from the *.exe files.
          for exe in "$BIN_DIR"/*.exe; do
            ldd "$exe" >> /tmp/dll_list1.txt
          done

          # Select matching dependencies
          grep "$MINGW_PREFIX/bin/" /tmp/dll_list1.txt | awk '{print $3}' > /tmp/dll_list2.txt

          # Remove duplicate dependencies
          sort -u /tmp/dll_list2.txt > /tmp/dll_list3.txt

          # Copy the dlls
          while read -r dll; do
            cp -v "$dll" "$LIB_DIR/"
          done < /tmp/dll_list3.txt

      - name: Create launcher script
        shell: msys2 {0}
        run: |
          cat > /tmp/gtkwave/gtkwave.cmd << 'EOF'
          @echo off
          setlocal
          set "BASE_DIR=%~dp0"
          set "PATH=%BASE_DIR%lib;%PATH%"
          echo Starting GTKWave...
          "%BASE_DIR%bin\gtkwave.exe" %*
          endlocal
          EOF

          cat -n /tmp/gtkwave/gtkwave.cmd

      - name: Show the bundle directory tree
        shell: msys2 {0}
        run: |
          tree /tmp/gtkwave

      - name: Create Windows bundle ZIP
        shell: msys2 {0}
        run: |
          pushd /tmp
          zip -r -v gtkwave-windows-x86-64-bundle.zip gtkwave/
          popd

      - name: Convert the bundle path to windows
        shell: msys2 {0}
        run: |
          BUNDLE_WIN_PATH=$(cygpath -w "/tmp/gtkwave-windows-x86-64-bundle.zip")
          echo "BUNDLE_WIN_PATH=$BUNDLE_WIN_PATH"
          echo "BUNDLE_WIN_PATH=$BUNDLE_WIN_PATH" >> $GITHUB_ENV

      - name: Upload bundle archive as an artifact
        uses: actions/upload-artifact@v6
        with:
          name: gtkwave-windows-x86-64-bundle
          path: ${{ env.BUNDLE_WIN_PATH }}
          if-no-files-found: error
          retention-days: 14

      - name: Run the tests
        shell: msys2 {0}
        run: |
          meson test -C build -v

  build-linux-x86-64:
    name: Build (linux-x86-64)
    # NOTE: Using ubuntu-latest here links to a newer glibc that is
    # not backward compatible with Ubuntu LTS 22.x. This supports also
    # the newer Ubuntu LTS 24.x.
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get -y install \
              gperf \
              desktop-file-utils \
              libgtk-3-dev \
              libgtk-4-dev \
              libjudy-dev \
              libgirepository1.0-dev \
              libjson-glib-dev

      - name: Install meson
        run: |
          pip install meson ninja

      - name: Setup meson build
        run: |
          meson setup -Djudy=disabled -Dprefix=/tmp/gtkwave build

      - name: Compile GTKWave
        run: |
          meson compile -C build

      - name: Show the build directory tree
        run: |
          tree -d build

      - name: Create executable bundle
        run: |
          meson install -C build

      - name: Create launcher script
        run: |
          cat > /tmp/gtkwave/gtkwave << 'EOF'
          #!/usr/bin/env bash

          # Get the directory where this script lives
          SCRIPT_DIR="$( cd "$( dirname "${BASH_SOURCE[0]}" )" && pwd )"

          # Add the local lib/x86_64-linux-gnu dir at the front of LD_LIBRARY_PATH
          export LD_LIBRARY_PATH="$SCRIPT_DIR/lib/x86_64-linux-gnu${LD_LIBRARY_PATH:+:$LD_LIBRARY_PATH}"

          # Add the local share/ dir at the front of XDG_DATA_DIRS
          export XDG_DATA_DIRS="$SCRIPT_DIR/share${XDG_DATA_DIRS:+:$XDG_DATA_DIRS}"

          # Run the actual binary, passing along any arguments
          exec "$SCRIPT_DIR/bin/gtkwave" "$@"
          EOF

          chmod +x /tmp/gtkwave/gtkwave
          cat -n /tmp/gtkwave/gtkwave

      - name: Show the bundle directory tree
        run: |
          tree /tmp/gtkwave

      - name: Tar the bundle directory
        run: |
          pushd /tmp
          tar -czvf gtkwave-linux-x86-64-bundle.tar.gz gtkwave
          popd

      - name: Upload bundle archive as an artifact
        uses: actions/upload-artifact@v6
        with:
          name: gtkwave-linux-x86-64-bundle
          path: /tmp/gtkwave-linux-x86-64-bundle.tar.gz
          if-no-files-found: error
          retention-days: 14

      - name: Run the tests
        run: |
          meson test -C build -v

  build-macos-arm64:
    name: Build (macos-arm64)
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          brew install \
              meson \
              gtk+3 \
              gtk4 \
              gtk-mac-integration \
              gobject-introspection \
              shared-mime-info \
              desktop-file-utils \
              json-glib \
              librsvg

      - name: Setup meson build script
        run: meson setup build

      - name: Compile GTKWave
        run: meson compile -C build

      - name: Run tests
        run: meson test -C build -v

      - name: Build and install GTKWave.app
        run: |
          sh ./macos/build.sh

          # Export the .app dir location.
          echo "APP_DIR=${HOME}/Applications/GTKWave.app" >> "$GITHUB_ENV"

      - name: Archive Applications/GTKWave.app
        run: |
          # Create the archive under ./build
          # Use ditto instead of zip to make sure resources forks are preserved in the zip archive.
          ditto -c -k --sequesterRsrc --keepParent "${APP_DIR}" build/GTKWave.app.zip
          ls -lh build/GTKWave.app.zip

      # NOTE: If downloading, remember to run 'xattr -c macos-gtkwave-app.zip'
      # to remove the quarantine flag.
      - name: Upload the archived GTKWave.app archive artifact
        uses: actions/upload-artifact@v6
        with:
          # NOTE: Github adds a zip layer and appends '.zip' to the name.
          name: gtkwave-macos-arm64-app
          path: build/GTKWave.app.zip
          if-no-files-found: error
          retention-days: 14
